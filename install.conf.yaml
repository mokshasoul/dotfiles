- defaults:
    link:
        relink: true

- clean: ['~']

- link:
        ~/.dotfiles: ''
        ~/.tmux.conf: tmux.conf
        ~/.vimrc: vimrc
        ~/.emacs.d : prelude
        ~/.config/i3 : i3
        ~/.bashrc : bashrc
        ~/.config/rofi: rofi
        ~/.Xresources : Xresources

- shell:
  - [ git submodule update --init --recursive, Installing submodules]
