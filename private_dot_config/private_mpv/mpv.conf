# Apple Silicon optimized settings
vo=gpu-next
hwdec=auto
hwdec-codecs=all
gpu-api=vulkan
gpu-context=macvk
gpu-hwdec-interop=auto
macos-force-dedicated-gpu=yes
macos-render-timer=feedback
vulkan-async-compute=yes
vulkan-async-transfer=yes
vulkan-queue-count=1
vd-lavc-dr=yes



reset-on-next-file=audio-delay,pause,speed,sub-delay,video-aspect-override,video-pan-x,video-pan-y,video-rotate,video-zoom,volume
framedrop=no

# Cache & Demuxer
audio-buffer=0.3
demuxer-readahead-secs=5
demuxer-max-bytes=300MiB
video-sync=display-resample
vd-lavc-threads=0
ad-lavc-threads=2

# Adio
mute=yes
volume=50
ad-lavc-downmix=yes
audio-channels=stereo

# Interpolation (comment out if you prefer judder over soap opera)
interpolation=yes
tscale=oversample # smoothmotion; lowest-artifact interpolation method

# Scaling
scale=ewa_lanczos
dscale=catmull_rom
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes

# Debanding
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=16
deband-grain=4

# Dithering
dither-depth=auto
temporal-dither=yes
dither=fruit

deinterlace=no # global reset of deinterlacing to off
save-position-on-quit=yes # resume playback from last position on reopen (writes to ~/.config/mpv/watch_later/)

target-prim=auto
# target-prim=bt.709 # target Rec.709 for SDR TVs
# target-prim=bt.2020 # target Rec.2020 (wide color gamut) for HDR TVs
target-trc=auto


# Window
keep-open=no
keepaspect=yes
auto-window-resize=no
keepaspect-window=no
no-hidpi-window-scale
osd-level=3
######
# UI #
######

border=no # hide the window title bar
msg-color=yes # color log messages on terminal
term-osd-bar=yes # display a progress bar on the terminal
force-window=immediate
cursor-autohide=1000 # autohide the cursor after 1s
# fullscreen=yes # start in fullscreen mode by default

macos-title-bar-appearance=vibrantDark
macos-title-bar-material=popover
macos-fs-animation-duration=0
#playlist
directory-mode=ignore
directory-filter-types=video,playlist
autocreate-playlist=filter
