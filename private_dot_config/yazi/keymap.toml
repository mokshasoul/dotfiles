# keymap.toml
[mgr]
prepend_keymap = [
  { on = "T", run = "plugin toggle-pane min-preview", desc = "Show or hide the preview pane" },
  { on = "+", run = "plugin toggle-pane max-preview", desc = "Maximize or restore the preview pane" },
  { on = "<C-p>", run = "shell -- qlmanage -p %s" },
  { on = "<F9>", run = "plugin mediainfo -- toggle-metadata", desc = "Toggle media preview metadata" },
]
