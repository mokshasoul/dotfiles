# keymap.toml
[mgr]
prepend_keymap = [
  { on = "T", run = "plugin toggle-pane min-preview", desc = "Show or hide the preview pane" },
  { on = "+", run = "plugin toggle-pane max-preview", desc = "Maximize or restore the preview pane" },
  { on = "<C-p>", run = "shell -- qlmanage -p %s" },
  { on = "<F9>", run = "plugin mediainfo -- toggle-metadata", desc = "Toggle media preview metadata" },
  # In ~/.config/yazi/keymap.toml

  ## ffmpeg linemodes - toggle individual stats
  { on = [
    "m",
    "f",
    "d",
  ], run = "plugin ffmpeg-stats -- toggle-duration", desc = "Toggle duration" },
  { on = [
    "m",
    "f",
    "r",
  ], run = "plugin ffmpeg-stats -- toggle-resolution", desc = "Toggle resolution" },
  { on = [
    "m",
    "f",
    "c",
  ], run = "plugin ffmpeg-stats -- toggle-codec", desc = "Toggle codec" },
  { on = [
    "m",
    "f",
    "f",
  ], run = "plugin ffmpeg-stats -- toggle-fps", desc = "Toggle FPS" },
  { on = [
    "m",
    "f",
    "b",
  ], run = "plugin ffmpeg-stats -- toggle-bitrate", desc = "Toggle bitrate" },
  { on = [
    "m",
    "f",
    "a",
  ], run = "plugin ffmpeg-stats -- toggle-audio-codec", desc = "Toggle audio codec" },
  { on = [
    "m",
    "f",
    "h",
  ], run = "plugin ffmpeg-stats -- toggle-audio-channels", desc = "Toggle audio channels" },
  { on = [
    "m",
    "f",
    "o",
  ], run = "plugin ffmpeg-stats -- toggle-format", desc = "Toggle format" },
  { on = [
    "m",
    "f",
    "s",
  ], run = "plugin ffmpeg-stats -- toggle-aspect", desc = "Toggle aspect ratio" },

  # Bulk toggle operations
  { on = [
    "m",
    "f",
    "A",
  ], run = "plugin ffmpeg-stats -- toggle-all", desc = "Toggle all stats" },
  { on = [
    "m",
    "f",
    "D",
  ], run = "plugin ffmpeg-stats -- disable-all", desc = "Disable all stats" },
]
