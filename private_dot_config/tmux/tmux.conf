# vim: ft=tmux
# Optimized tmux configuration for tmux 3.6a + Ghostty
# Updated: 2025-01-03
# Base config: https://github.com/square/maximum-awesome & https://github.com/folke/dot

# ============================================================================
# PREFIX & CORE SETTINGS
# ============================================================================

# Use C-a as prefix (more ergonomic than C-b)
unbind-key C-a
set -g prefix C-a
bind-key C-a send-prefix

# Mouse support
set -g mouse on

# Shell configuration
set -g default-terminal tmux-256color
set -g default-shell $SHELL

# Enable passthrough for OSC sequences (required for OSC 52 over SSH)
set -s set-clipboard external
set -g allow-passthrough on
#
# Pass modifier keys (Shift+Enter, etc.) to applications inside tmux
set -g extended-keys on
set -g extended-keys-format csi-u
# ============================================================================
# WINDOW & PANE INDEXING
# ============================================================================

# Start indexing at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# ============================================================================
# WINDOW & PANE NAMING
# ============================================================================

set -g automatic-rename off
set -g allow-rename on

# ============================================================================
# KEY BINDINGS - BASIC COMMANDS
# ============================================================================

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# ============================================================================
# KEY BINDINGS - SESSION MANAGEMENT
# ============================================================================

bind-key S choose-tree -sZ -O name
bind-key X kill-session
bind-key N new-session

# ============================================================================
# KEY BINDINGS - WINDOW SPLITTING
# ============================================================================

# Remove default split bindings
unbind '"'
unbind %
# Split panes with intuitive keys (both styles supported)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# ============================================================================
# KEY BINDINGS - PANE NAVIGATION (VIM-STYLE)
# ============================================================================

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ============================================================================
# KEY BINDINGS - WINDOW NAVIGATION
# ============================================================================

bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ============================================================================
# KEY BINDINGS - PANE RESIZING
# ============================================================================

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ============================================================================
# KEY BINDINGS - LAYOUTS
# ============================================================================

bind-key C-o rotate-window
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

# ============================================================================
# KEY BINDINGS - PANE MANAGEMENT
# ============================================================================

bind-key a last-pane
bind-key q display-panes
bind-key c new-window -c '#{pane_current_path}'

# ============================================================================
# COPY MODE - VI STYLE
# ============================================================================

set -gw mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Paste with prefix + p
bind-key p paste-buffer

# ============================================================================
# MOUSE CONFIGURATION
# ============================================================================

# Enable mousewheel/trackpad scrolling
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# ============================================================================
# WINDOW OPTIONS
# ============================================================================

# Monitor activity
set -g monitor-activity on
set -g visual-activity off

# ============================================================================
# TIMING
# ============================================================================

# Allow arrow keys immediately after changing windows
set -g repeat-time 0

# Disable assume-paste-time (Ghostty handles pasting well)
set -g assume-paste-time 0

# ============================================================================
# TERMINAL & COLOR SETTINGS (OPTIMIZED FOR GHOSTTY)
# ============================================================================

# Ghostty has excellent false color and OSC 52 support
set -as terminal-features ',xterm-ghostty:extkeys:256:RGB:osc7:mouse:hyperlinks'

# Enable focus events (Ghostty supports this)
set -g focus-events on


# tmux-sensible

# Address vim mode switching delay (http://superuser.com/a/252718/65504)
set -sg escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# ============================================================================
# PLUGIN MANAGER (TPM)
# ============================================================================

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'Nucc/tmux-which-key'

# ============================================================================
# PLUGIN CONFIGURATION - CATPPUCCIN THEME
# ============================================================================

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text "#{b:pane_current_path}"
set -g @catppuccin_window_current_text "#{b:pane_current_path}"
set -g @catppuccin_window_flags "icon"

# ============================================================================
# TPM INSTALLATION & INITIALIZATION
# ============================================================================

# Set plugin path
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# Auto-install TPM only when no system-managed TPM is available
if "test ! -f /opt/homebrew/opt/tpm/share/tpm/tpm && test ! -f /usr/share/tmux-plugin-manager/tpm && test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM: prefer Homebrew → apt → manual clone (keep this at the very bottom)
if "test -f /opt/homebrew/opt/tpm/share/tpm/tpm" \
   "run -b '/opt/homebrew/opt/tpm/share/tpm/tpm'" \
   "if \"test -f /usr/share/tmux-plugin-manager/tpm\" \
      \"run -b '/usr/share/tmux-plugin-manager/tpm'\" \
      \"run -b '~/.tmux/plugins/tpm/tpm'\""

# ============================================================================
# STATUS BAR — catppuccin module composition (must be after TPM run)
# ============================================================================

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set-hook -g client-dark-theme {
  set -g @catppuccin_flavor "mocha"
  set -g @catppuccin_reset "true"

  # NOTE: you may need to set more `@catppuccin_*` variables to fully reset
  # everything.
  run ~/.tmux/plugins/tmux/catppuccin.tmux
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"

  # NOTE: you may need to set more `@catppuccin_*` variables to fully reset
  # everything.

  run ~/.tmux/plugins/tmux/catppuccin.tmux
}
